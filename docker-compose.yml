version: '3.8'

services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: presenter_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password_987
      POSTGRES_DB: presenter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Pub/Sub Scaling Service
  redis:
    image: redis:7-alpine
    container_name: presenter_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Cloud Backend Server
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: presenter_backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres_secure_password_987@postgres:5432/presenter
      REDIS_URL: redis://redis:6379
      JWT_SECRET: production_jwt_secret_token_change_me
      JWT_REFRESH_SECRET: production_refresh_secret_token_change_me
      CLIENT_URL: http://localhost:3000
    ports:
      - "3001:3001"

  # 4. Next.js Mobile Web Front-end
  mobile-web:
    build:
      context: ./apps/mobile-web
      dockerfile: Dockerfile
    container_name: presenter_mobile_web
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
    ports:
      - "3000:3000"

  # 5. Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: presenter_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - mobile-web

volumes:
  postgres_data:
  redis_data:
